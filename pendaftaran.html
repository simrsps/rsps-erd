<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERD Pendaftaran</title>
    <link rel="stylesheet" href="shared.css" />
  </head>
  <body>
    <div class="toolbar">
      <span>🖱 Drag tabel untuk memindahkan</span>
      <div class="legend">
        <div class="leg-item">
          <span class="badge pk">PK</span><span>Primary Key</span>
        </div>
        <div class="leg-item">
          <span class="badge fk">FK</span><span>Foreign Key</span>
        </div>
        <div class="leg-item">
          <span
            style="
              display: inline-block;
              width: 24px;
              height: 2px;
              background: #378add;
              border-top: 2px dashed #378add;
            "
          ></span
          ><span>N-1 (Dashed line)</span>
        </div>
        <div class="leg-item">
          <span
            style="
              display: inline-block;
              width: 24px;
              height: 2px;
              background: #639922;
            "
          ></span
          ><span>1-1 (Solid line)</span>
        </div>
        <div class="leg-item">
          <svg
            style="
              display: inline-block;
              width: 20px;
              height: 14px;
              margin-right: 4px;
            "
            viewBox="0 0 20 14"
          >
            <path
              d="M5 1L10 7L5 13 M10 7L0 7"
              fill="none"
              stroke="#378add"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
          <span>Many (Crow's foot)</span>
        </div>
        <div class="leg-item">
          <svg
            style="
              display: inline-block;
              width: 20px;
              height: 14px;
              margin-right: 4px;
            "
            viewBox="0 0 20 14"
          >
            <line
              x1="3"
              y1="1"
              x2="3"
              y2="13"
              stroke="#378add"
              stroke-width="1.5"
            />
            <line
              x1="7"
              y1="1"
              x2="7"
              y2="13"
              stroke="#378add"
              stroke-width="1.5"
            />
          </svg>
          <span>One (||)</span>
        </div>
      </div>
    </div>
    <div id="canvas-wrap">
      <div id="canvas">
        <svg id="arrows">
          <defs>
            <!-- Crow's foot markers for many side (N-1 and 1-N) -->
            <marker
              id="crowsfoot-blue"
              viewBox="0 0 10 10"
              refX="0"
              refY="5"
              markerWidth="6"
              markerHeight="6"
              orient="auto"
            >
              <path
                d="M5 1L10 5L5 9 M10 5L0 5"
                fill="none"
                stroke="#378add"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </marker>
            <marker
              id="crowsfoot-green"
              viewBox="0 0 10 10"
              refX="0"
              refY="5"
              markerWidth="6"
              markerHeight="6"
              orient="auto"
            >
              <path
                d="M5 1L10 5L5 9 M10 5L0 5"
                fill="none"
                stroke="#3b6d11"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </marker>

            <!-- One side markers (double line: ||) -->
            <marker
              id="one-blue"
              viewBox="0 0 10 10"
              refX="0"
              refY="5"
              markerWidth="6"
              markerHeight="6"
              orient="auto"
            >
              <line
                x1="2"
                y1="1"
                x2="2"
                y2="9"
                stroke="#378add"
                stroke-width="1.5"
              />
              <line
                x1="6"
                y1="1"
                x2="6"
                y2="9"
                stroke="#378add"
                stroke-width="1.5"
              />
            </marker>
            <marker
              id="one-green"
              viewBox="0 0 10 10"
              refX="0"
              refY="5"
              markerWidth="6"
              markerHeight="6"
              orient="auto"
            >
              <line
                x1="2"
                y1="1"
                x2="2"
                y2="9"
                stroke="#3b6d11"
                stroke-width="1.5"
              />
              <line
                x1="6"
                y1="1"
                x2="6"
                y2="9"
                stroke="#3b6d11"
                stroke-width="1.5"
              />
            </marker>
          </defs>
        </svg>
      </div>
    </div>

    <script src="shared.js"></script>
    <script>
      // Define data for Pendaftaran ERD
      const TABLES = {

            {
              n: "KODE",
              t: "varchar(2)",
              pk: true,
              note: "Kode unik 2 karakter untuk identifikasi unit",
            },
            {
              n: "UNIT",
              t: "varchar(200)",
              note: "Nama lengkap unit atau departemen",
            },
            { n: "GROUP_", t: "varchar(2)", note: null },
            { n: "MD", t: "tinyint(3)", note: null },
            { n: "CV_", t: "decimal(2,0)", note: null },
            { n: "C1_", t: "decimal(2,0)", note: null },
            { n: "C2_", t: "decimal(2,0)", note: null },
            { n: "C3A_", t: "decimal(2,0)", note: null },
            { n: "C3B_", t: "decimal(2,0)", note: null },
            { n: "BED", t: "decimal(2,0)", note: null },
            { n: "KL", t: "varchar(2)", note: null },
            { n: "STS", t: "varchar(20)", note: null },
          ],
        },
        c_pst: {

            { n: "edu", t: "varchar(1)", fk: "c_edu", note: null },
            { n: "pkj", t: "varchar(2)", fk: "c_pkj", note: null },
            { n: "reg", t: "int(9)", fk: "cm_reg__", note: null },

        cm_reg__: {

            { n: "unit", t: "varchar(2)", fk: "c_upm", note: null },
            { n: "kl", t: "varchar(2)", note: null },
            { n: "dr", t: "varchar(3)", fk: "c_doc", note: null },
            { n: "cm", t: "int(8)", fk: "c_pst", note: null },
            { n: "asr", t: "varchar(2)", fk: "c_asr", note: null },
            { n: "asal", t: "varchar(6)", fk: "c_ref4", note: null },
            { n: "cout", t: "varchar(1)", note: null },
            { n: "out2", t: "varchar(2)", note: null },
            { n: "wo", t: "varchar(1)", note: null },
            { n: "channel", t: "varchar(20)", note: null },
            { n: "updt", t: "timestamp", note: null },
          ],
        },
        cm_j26__: {
          color: "#533489",
          light: "#eeedfe",
          note: null,
          cols: [
            { n: "id", t: "int(11)", pk: true, note: null },
            { n: "db", t: "date", note: null },
            { n: "ut", t: "varchar(2)", fk: "c_upm", note: null },
            { n: "dj", t: "varchar(3)", fk: "c_doc", note: null },
            { n: "qu", t: "smallint(3)", note: null },
            { n: "qd", t: "smallint(3)", note: null },
            { n: "qu_text", t: "varchar(50)", note: null },
            { n: "crg", t: "varchar(9)", fk: "cm_reg__", note: null },
            { n: "ccm", t: "varchar(8)", fk: "c_pst", note: null },
            { n: "booking_id", t: "int(11)", fk: "cm_sch__", note: null },
            { n: "hb", t: "varchar(4)", note: null },
            { n: "status", t: "varchar(50)", note: null },
          ],
        },
        c_asr: {
          color: "#c41e3a",
          light: "#ffe6e6",
          note: null,
          cols: [
            { n: "kode", t: "varchar(2)", pk: true, note: null },
            { n: "asuransi", t: "varchar(35)", note: null },
            { n: "cob_bpjs", t: "varchar(1)", note: null },
            { n: "jkn", t: "tinyint(1)", note: null },
            { n: "alamat", t: "varchar(35)", note: null },
            { n: "kota", t: "varchar(15)", note: null },
            { n: "tlp", t: "varchar(14)", note: null },
          ],
        },
        c_doc: {
          color: "#6f2da8",
          light: "#f3e5ff",
          note: null,
          cols: [
            { n: "kode", t: "varchar(3)", pk: true, note: null },
            { n: "nama", t: "varchar(60)", note: null },
            { n: "spesialis", t: "varchar(18)", note: null },
            { n: "idsp", t: "varchar(1)", note: null },
            { n: "alamat", t: "varchar(200)", note: null },
            { n: "tlp", t: "varchar(25)", note: null },
            { n: "status", t: "varchar(1)", note: null },

            { n: "alias", t: "varchar(30)", note: null },

        },
        c_edu: {
          color: "#ff8c00",
          light: "#ffe4d6",
          note: null,
          cols: [
            { n: "KODE", t: "char(2)", pk: true, note: null },

        c_pkj: {
          color: "#228b22",

        c_ref4: {
          color: "#1e90ff",

          note: null,
          cols: [

            { n: "asal", t: "varchar(100)", note: null },
            { n: "ket", t: "varchar(35)", note: null },

        c_pst_af: {
          color: "#ff4500",
          light: "#ffe6d6",
          note: null,
          cols: [
            { n: "ID", t: "int(11)", pk: true, note: null },
            { n: "CCM", t: "varchar(8)", fk: "c_pst", note: null },
            { n: "ASR", t: "varchar(2)", note: null },
            { n: "DUE", t: "date", note: null },
            { n: "NO", t: "varchar(20)", note: null },
            { n: "CRT", t: "timestamp", note: null },
          ],
        },
        cm_sch__: {
          color: "#2f4f4f",
          light: "#e8f5f0",
          note: null,
          cols: [
            { n: "ID", t: "int(9)", pk: true, note: null },
            { n: "DSC", t: "date", note: null },
            { n: "U2", t: "varchar(2)", fk: "c_upm", note: null },
            { n: "DR", t: "varchar(3)", fk: "c_doc", note: null },
            { n: "NO", t: "smallint(3)", note: null },
            { n: "qu_text", t: "varchar(50)", note: null },
            { n: "CCM", t: "varchar(8)", fk: "c_pst", note: null },
            { n: "ASI", t: "varchar(2)", fk: "c_asr", note: null },

        ref_relegions: {

          note: null,
          cols: [
            { n: "kode", t: "varchar(13)", pk: true, note: null },
            { n: "nama", t: "varchar(100)", note: null },

      const POSITIONS = {
        c_upm: { x: 20, y: 20 },
        c_pst: { x: 280, y: 20 },
        cm_reg__: { x: 520, y: 20 },
        cm_j26__: { x: 760, y: 20 },
        c_asr: { x: 1000, y: 20 },
        c_doc: { x: 20, y: 350 },
        c_edu: { x: 280, y: 350 },
        c_pkj: { x: 520, y: 350 },
        c_ref4: { x: 760, y: 350 },
        c_pst_af: { x: 1000, y: 350 },
        cm_sch__: { x: 1240, y: 20 },
        ref_relegions: { x: 280, y: 630 },
        ref_wilayah: { x: 520, y: 630 },
      };

      const RELATIONS = [
        // cm_reg__ relationships
        ["cm_reg__", "unit", "c_upm", "KODE", "n1"],
        ["cm_reg__", "cm", "c_pst", "cm", "n1"],
        ["cm_reg__", "dr", "c_doc", "kode", "n1"],
        ["cm_reg__", "asr", "c_asr", "kode", "n1"],
        ["cm_reg__", "asal", "c_ref4", "kode", "n1"],

        // c_pst relationships
        ["c_pst", "reg", "cm_reg__", "no", "11"],
        ["c_pst", "edu", "c_edu", "KODE", "n1"],
        ["c_pst", "pkj", "c_pkj", "KODE", "n1"],
        ["c_pst", "agama", "ref_relegions", "id", "n1"],
        ["c_pst", "wilayah", "ref_wilayah", "kode", "n1"],
        ["c_pst", "wilayah_domisili", "ref_wilayah", "kode", "n1"],

        // cm_j26__ relationships

        ["cm_j26__", "dj", "c_doc", "kode", "n1"],
        ["cm_j26__", "crg", "cm_reg__", "no", "n1"],
        ["cm_j26__", "ccm", "c_pst", "cm", "n1"],
        ["cm_j26__", "booking_id", "cm_sch__", "ID", "11"],

        // c_pst_af relationships

        // cm_sch__ relationships
        ["cm_sch__", "U2", "c_upm", "KODE", "n1"],
        ["cm_sch__", "DR", "c_doc", "kode", "n1"],
        ["cm_sch__", "CCM", "c_pst", "cm", "n1"],
        ["cm_sch__", "ASI", "c_asr", "kode", "n1"],

      // Initialize when DOM is ready
      document.addEventListener("DOMContentLoaded", initializeERD);
    </script>
  </body>
</html>
