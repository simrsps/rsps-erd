<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERD Lab</title>
    <link rel="stylesheet" href="shared.css" />
  </head>
  <body>
    <div class="toolbar">
      <span>🖱 Drag tabel untuk memindahkan</span>
      <div class="legend">
        <div class="leg-item">
          <span class="badge pk">PK</span><span>Primary Key</span>
        </div>
        <div class="leg-item">
          <span class="badge fk">FK</span><span>Foreign Key</span>
        </div>
      </div>
    </div>
    <div id="canvas-wrap">
      <div id="canvas">
        <svg id="arrows">
          <defs>
            <marker
              id="crowsfoot-blue"
              viewBox="0 0 10 10"
              refX="0"
              refY="5"
              markerWidth="6"
              markerHeight="6"
              orient="auto"
            >
              <path
                d="M5 1L10 5L5 9 M10 5L0 5"
                fill="none"
                stroke="#378add"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </marker>
            <marker
              id="crowsfoot-green"
              viewBox="0 0 10 10"
              refX="0"
              refY="5"
              markerWidth="6"
              markerHeight="6"
              orient="auto"
            >
              <path
                d="M5 1L10 5L5 9 M10 5L0 5"
                fill="none"
                stroke="#3b6d11"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </marker>
            <marker
              id="one-blue"
              viewBox="0 0 10 10"
              refX="0"
              refY="5"
              markerWidth="6"
              markerHeight="6"
              orient="auto"
            >
              <line
                x1="2"
                y1="1"
                x2="2"
                y2="9"
                stroke="#378add"
                stroke-width="1.5"
              />
              <line
                x1="6"
                y1="1"
                x2="6"
                y2="9"
                stroke="#378add"
                stroke-width="1.5"
              />
            </marker>
            <marker
              id="one-green"
              viewBox="0 0 10 10"
              refX="0"
              refY="5"
              markerWidth="6"
              markerHeight="6"
              orient="auto"
            >
              <line
                x1="2"
                y1="1"
                x2="2"
                y2="9"
                stroke="#3b6d11"
                stroke-width="1.5"
              />
              <line
                x1="6"
                y1="1"
                x2="6"
                y2="9"
                stroke="#3b6d11"
                stroke-width="1.5"
              />
            </marker>
          </defs>
        </svg>
      </div>
    </div>

    <script src="shared.js"></script>
    <script>
      // Define which tables to load for this module (empty for now)
      const tablesToLoad = [];

      // Define positions for each table
      const POSITIONS = {};

      // Load and merge table data from individual JSON files
      let TABLES = {};
      let RELATIONS = [];

      if (tablesToLoad.length === 0) {
        // Show placeholder if no tables defined
        document.getElementById("canvas").innerHTML =
          '<div style="display:flex; align-items:center; justify-content:center; height:100%; color:#999; font-size:18px;">Modul Lab - Data ERD akan ditampilkan di sini</div>';
      } else {
        Promise.all(
          tablesToLoad.map((tableName) =>
            fetch(`data/tables/${tableName}.json`)
              .then((response) => response.json())
              .then((data) => ({
                tableName,
                tableData: data.table,
                relations: data.relations || [],
              })),
          ),
        )
          .then((results) => {
            // Merge all tables and relations using spread operator
            results.forEach(({ tableName, tableData, relations }) => {
              TABLES = { ...TABLES, ...tableData };
              RELATIONS = [...RELATIONS, ...relations];
            });
            // Initialize ERD after all data is loaded
            initializeERD();
          })
          .catch((error) => {
            console.error("Error loading ERD data:", error);
            document.getElementById("canvas").innerHTML =
              '<div style="display:flex; align-items:center; justify-content:center; height:100%; color:#f00; font-size:14px;">Error loading ERD data</div>';
          });
      }
    </script>
  </body>
</html>
